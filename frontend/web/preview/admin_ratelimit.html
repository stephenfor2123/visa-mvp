<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>限流配置 · Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { --primary:#3B6EF5; --primary-hover:#2C5DE0; --primary-bg:#EAF0FE; --ink-1:#0F172A; --ink-2:#334155; --ink-3:#64748B; --border:#E2E8F0; --bg-alt:#F8FAFC; --muted:#94A3B8; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--ink-1); background: var(--bg-alt); }
  .admin-topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; background:#0F172A; color:#E2E8F0; }
  .admin-topbar__left { display:flex; align-items:center; gap:12px; }
  .admin-topbar__brand { display:flex; align-items:center; gap:8px; color:#F8FAFC; text-decoration:none; font-weight:600; }
  .admin-topbar__mark { width:28px; height:28px; border-radius:6px; background:var(--primary); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-weight:700; }
  .admin-topbar__crumb { color:#94A3B8; font-size:13px; }
  .admin-topbar__right { display:flex; align-items:center; gap:12px; }
  .admin-topbar__user { font-size:13px; }
  .admin-topbar__logout { background:transparent; border:1px solid rgba(255,255,255,.16); color:#E2E8F0; padding:4px 10px; border-radius:6px; cursor:pointer; font-size:12px; }

  .admin-shell { max-width:1200px; margin:0 auto; padding:24px 28px 60px; }
  .page-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:20px; }
  .page-head__title { font-size:24px; font-weight:700; margin:0 0 4px; }
  .page-head__sub { font-size:13px; color:var(--ink-3); margin:0; }
  .ghost-btn { background:#fff; border:1px solid var(--border); color:var(--ink-2); padding:6px 12px; border-radius:6px; font-size:13px; cursor:pointer; }

  .stats-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; margin-bottom:24px; }
  .stat-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:18px; }
  .stat-card__label { font-size:12px; color:var(--ink-3); margin-bottom:8px; }
  .stat-card__value { display:flex; align-items:baseline; gap:4px; }
  .stat-card__num { font-size:28px; font-weight:700; color:var(--ink-1); }
  .stat-card__unit { font-size:12px; color:var(--muted); }
  .stat-card__delta { font-size:11px; color:#16A34A; margin-top:4px; }

  .config-section { background:#fff; border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:16px; }
  .config-section h2 { font-size:16px; font-weight:600; margin:0 0 16px; }
  .config-grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
  .config-field { display:flex; flex-direction:column; gap:6px; }
  .config-field label { font-size:12px; color:var(--ink-3); }
  .config-field input, .config-field select { padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:14px; background:#fff; }
  .save-row { display:flex; justify-content:flex-end; margin-top:16px; }
  .btn { padding:8px 18px; border-radius:6px; font-size:14px; font-weight:500; cursor:pointer; border:none; }
  .btn-primary { background:var(--primary); color:#fff; }
</style>
</head>
<body>
<div data-testid="rate-limit-page">
<header class="admin-topbar">
  <div class="admin-topbar__left">
    <a class="admin-topbar__brand"><span class="admin-topbar__mark">A</span><span>管理后台</span></a>
    <span class="admin-topbar__crumb">› 限流配置</span>
  </div>
  <div class="admin-topbar__right">
    <span class="admin-topbar__user" data-testid="admin-user-name">admin</span>
    <span class="lang-switch" style="padding:4px 10px;border:1px solid rgba(255,255,255,.16);border-radius:6px;font-size:12px;">中</span>
    <button class="admin-topbar__logout" data-testid="admin-logout-btn">退出</button>
  </div>
</header>

<main class="admin-shell">
  <section class="page-head" data-testid="rate-limit-head">
    <div>
      <h1 class="page-head__title">限流配置</h1>
      <p class="page-head__sub">实时调整 RPA 提交接口的访问频率限制,保护下游服务</p>
    </div>
    <div class="page-head__actions">
      <button class="ghost-btn" data-testid="rate-limit-refresh-stats">🔄 刷新统计</button>
    </div>
  </section>

  <section class="stats-grid" data-testid="rate-limit-stats">
    <div class="stat-card" data-testid="stat-today-visits">
      <div class="stat-card__label">今日访问</div>
      <div class="stat-card__value">
        <span class="stat-card__num">2,847</span>
        <span class="stat-card__unit">次</span>
      </div>
      <div class="stat-card__delta">↑ 12.3% 较昨日</div>
    </div>
    <div class="stat-card" data-testid="stat-current-queue">
      <div class="stat-card__label">当前排队</div>
      <div class="stat-card__value">
        <span class="stat-card__num">7</span>
        <span class="stat-card__unit">任务</span>
      </div>
      <div class="stat-card__delta">正常水位</div>
    </div>
    <div class="stat-card" data-testid="stat-fail-rate">
      <div class="stat-card__label">24h 失败率</div>
      <div class="stat-card__value">
        <span class="stat-card__num">2.1</span>
        <span class="stat-card__unit">%</span>
      </div>
      <div class="stat-card__delta" style="color:#DC2626">↑ 0.4% 需关注</div>
    </div>
    <div class="stat-card" data-testid="stat-active-accounts">
      <div class="stat-card__label">活跃账号</div>
      <div class="stat-card__value">
        <span class="stat-card__num">328</span>
        <span class="stat-card__unit">个</span>
      </div>
      <div class="stat-card__delta">↑ 9 本周</div>
    </div>
  </section>

  <section class="config-section">
    <h2>限流参数</h2>
    <div class="config-grid">
      <div class="config-field">
        <label>单 IP 单日访问上限</label>
        <input type="number" value="100" />
      </div>
      <div class="config-field">
        <label>单账号提交间隔 (秒)</label>
        <input type="number" value="30" />
      </div>
      <div class="config-field">
        <label>错峰时段开始 (小时)</label>
        <input type="number" value="22" />
      </div>
      <div class="config-field">
        <label>错峰时段结束 (小时)</label>
        <input type="number" value="8" />
      </div>
    </div>
    <div class="save-row">
      <button class="btn btn-primary" data-testid="rate-limit-save">保存配置</button>
    </div>
  </section>
</main>
</div>
</body>
</html>
