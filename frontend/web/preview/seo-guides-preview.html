        seoDesc: 'Free visa application guides for Indonesia, Vietnam, Philippines, India and more.',
        cards: [
          { flag: '🇮🇩', locale: 'Indonesia', title: 'Cara Apply Visa Amerika dari Indonesia', excerpt: 'Dokumen, DS-160, wawancara Kedutaan Jakarta — panduan lengkap 2026.' },
          { flag: '🇻🇳', locale: 'Vietnam', title: 'Hướng dẫn xin visa Mỹ cho người Việt Nam', excerpt: 'Hồ sơ, DS-160, phỏng vấn ĐSQ Mỹ Hà Nội / TP.HCM.' },
          { flag: '🇵🇭', locale: 'Philippines', title: 'US Tourist Visa Guide for Filipinos', excerpt: 'Documents, DS-160, US Embassy Manila interview tips.' },
          { flag: '🇮🇳', locale: 'India', title: 'US Visa Application from India', excerpt: 'CGI Federal, OFC biometrics, consular interview walkthrough.' },
          { flag: '🌐', locale: 'All markets', title: 'DS-160 Form: Complete Field-by-Field Guide', excerpt: 'Universal walkthrough for the US nonimmigrant visa application.' },
          { flag: '🌐', locale: 'Tool', title: 'Visa Document Checklist Generator', excerpt: 'Pick your nationality + destination → get a personalized checklist.' },
        ],
      },
    }

    const TOOL_COPY = {
      zh: {
        title: '签证材料清单生成器',
        sub: '选择国籍与目的地，即时生成个性化材料清单 — 免费，无需注册。',
        nationality: '你的国籍',
        destination: '签证目的地',
        cta: '生成清单',
        resultTitle: '你的美签 B1/B2 材料清单',
        breadcrumb: '指南 / 工具 / 清单生成器',
        seoTitle: '免费美签材料清单生成器 — Htex',
        seoDesc: '选择国籍与目的地，立即获得个性化签证材料清单。',
        upsellTitle: '想让 AI 帮你核对材料吗？',
        upsellSub: '上传护照与证明材料 — Htex 在递交前检查完整度。',
        upsellBtn: '开始免费检查 →',
      },
      en: {
        title: 'Visa Document Checklist Generator',
        sub: 'Select your nationality and destination to get a personalized document checklist — free, no sign-up required.',
        nationality: 'Your nationality',
        destination: 'Visa destination',
        cta: 'Generate checklist',
        resultTitle: 'Your checklist for US B1/B2 visa',
        breadcrumb: 'Guides / Tools / Checklist Generator',
        seoTitle: 'Free US Visa Document Checklist Generator — Htex',
        seoDesc: 'Pick nationality + destination, get a personalized visa document checklist instantly.',
        upsellTitle: 'Want AI to verify your documents?',
        upsellSub: 'Upload your passport and supporting docs — Htex checks completeness before you apply.',
        upsellBtn: 'Start free check →',
      },
    }

    let currentPage = 'guide'
    let currentLocale = 'zh'

    function uiBundle() {
      return currentLocale === 'zh' ? 'zh' : 'en'
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    function renderSeoPanel(c) {
      const schema = {
        '@context': 'https://schema.org',
        '@type': 'FAQPage',
        mainEntity: c.faqs.map(f => ({
          '@type': 'Question',
          name: f.q,
          acceptedAnswer: { '@type': 'Answer', text: f.a },
        })),
      }
      document.getElementById('seo-panel').innerHTML = `
        <strong>What crawlers see</strong> (each guide page gets unique values)<br>
        &lt;title&gt; <span class="val">${esc(c.title)}</span><br>
        &lt;meta name="description"&gt; <span class="val">${esc(c.description)}</span><br>
        &lt;link rel="canonical"&gt; <span class="val">https://htexvisa.com${c.slug}</span><br>
        &lt;link rel="alternate" hreflang&gt; <span class="val">zh · id · vi · en</span> (per locale version)<br>
        &lt;script type="application/ld+json"&gt; FAQPage with ${c.faqs.length} questions<br>
        <span style="color:#64748B">${esc(JSON.stringify(schema, null, 2).slice(0, 200))}…</span>
      `
    }

    function header(c) {
      return `
        <header class="site-header">
          <a class="brand" href="#"><span class="brand__mark">H</span> Htex</a>
          <nav class="site-nav">
            <a href="#">${c.navGuides}</a>
            <a href="#">${c.navTools}</a>
            <a href="#">${c.navDest}</a>
          </nav>
          <button class="header-cta">${c.ctaStart}</button>
        </header>
      `
    }

    function renderGuide() {
      const c = COPY[currentLocale]
      renderSeoPanel(c)
      document.documentElement.lang = currentLocale === 'zh' ? 'zh-CN' : currentLocale === 'vi' ? 'vi' : currentLocale === 'id' ? 'id' : 'en'

      const toc = [
        ['requirements', c.sections.requirements],
        ['steps', c.sections.steps],
        ['ds160', c.sections.ds160],
        ['interview', c.sections.interview],
        ['rejection', c.sections.rejection],
        ['faq', c.sections.faq],
      ]

      document.getElementById('preview-root').innerHTML = `
        ${header(c)}
        <div class="breadcrumb">
          <a href="#">${c.navGuides}</a> / <a href="#">${c.breadcrumbGuide}</a> / ${c.country}
        </div>
        <div class="guide-hero">
          <div class="guide-hero__tag"><span class="guide-hero__tag-dot"></span> ${c.flag} ${c.country} · ${c.lang}</div>
          <h1>${esc(c.h1)}</h1>
          <p class="guide-hero__sub">${esc(c.sub)}</p>
          <div class="guide-hero__meta">
            <span>📅 ${c.updated}</span>
            <span>⏱ ${c.readTime}</span>
            <span>🔗 htexvisa.com${c.slug}</span>
          </div>
        </div>
        <div class="guide-layout">
          <article class="guide-main">
            <p>${esc(c.intro)}</p>

            <div class="callout callout--tip"><strong>💡 ${esc(c.tipLabel || 'Tip')}</strong>${esc(c.tip)}</div>

            <h2 id="requirements">${esc(c.sections.requirements)}</h2>
            <ul class="checklist">
              ${c.checklist.map(item => `<li><span class="checklist__icon">✓</span><span>${esc(item)}</span></li>`).join('')}
            </ul>

            <h2 id="steps">${esc(c.sections.steps)}</h2>
            <ol class="steps">
              ${c.steps.map(s => `<li><h3>${esc(s.t)}</h3><p>${esc(s.d)}</p></li>`).join('')}
            </ol>

            <div class="inline-cta">
              <div class="inline-cta__text">
                <h3>${esc(c.ctaInlineTitle)}</h3>
                <p>${esc(c.ctaInlineSub)}</p>
              </div>
              <button class="inline-cta__btn">${esc(c.ctaInlineBtn)}</button>
            </div>

            <h2 id="ds160">${esc(c.sections.ds160)}</h2>
            <p>${esc(c.ds160Body)}</p>

            <h2 id="interview">${esc(c.sections.interview)}</h2>
            <p>${esc(c.interviewBody)}</p>

            <div class="callout callout--warn"><strong>⚠️ ${esc(c.warnLabel || 'Important')}</strong>${esc(c.warn)}</div>

            <h2 id="rejection">${esc(c.sections.rejection)}</h2>
            <ul>
              ${(c.rejectionReasons || []).map(r => `<li>${esc(r)}</li>`).join('')}
            </ul>

            <h2 id="faq">${esc(c.sections.faq)}</h2>
            <div class="faq">
              ${c.faqs.map((f, i) => `
                <div class="faq-item${i === 0 ? ' is-open' : ''}">
                  <button class="faq-q" type="button" onclick="toggleFaq(this)">${esc(f.q)} <span>▾</span></button>
                  <div class="faq-a">${esc(f.a)}</div>
                </div>
              `).join('')}
            </div>
          </article>

          <aside class="guide-sidebar">
            <p class="toc-title">${esc(c.tocTitle || 'On this page')}</p>
            <ul class="toc-list">
              ${toc.map(([id, label], i) => `<li><a href="#${id}" class="${i === 0 ? 'is-active' : ''}">${esc(label)}</a></li>`).join('')}
            </ul>
            <div class="cta-card">
              <h3>${esc(c.ctaSidebar)}</h3>
              <p>${esc(c.ctaSidebarSub)}</p>
              <button class="cta-card__btn">${esc(c.ctaStart)}</button>
              <p class="cta-card__fine">${esc(c.ctaFine)}</p>
            </div>
          </aside>
        </div>

        <section class="related">
          <h2>${esc(c.relatedTitle || 'Related guides')}</h2>
          <div class="related-grid">
            ${c.related.map(r => `
              <a class="related-card" href="#">
                <div class="related-card__flag">${r.flag}</div>
                <div class="related-card__title">${esc(r.title)}</div>
                <div class="related-card__sub">${esc(r.sub)}</div>
              </a>
            `).join('')}
          </div>
        </section>

        <footer class="site-footer">© 2026 Htex · htexvisa.com · Preview only</footer>
      `
    }

    function renderIndex() {
      const idx = INDEX_COPY[uiBundle()]
      const c = COPY[currentLocale]
      document.getElementById('seo-panel').innerHTML = `
        <strong>Index page SEO</strong><br>
        &lt;title&gt; <span class="val">${esc(idx.seoTitle)}</span><br>
        &lt;meta name="description"&gt; <span class="val">${esc(idx.seoDesc)}</span><br>
        &lt;link rel="canonical"&gt; <span class="val">https://htexvisa.com/guides</span>
      `
      document.getElementById('preview-root').innerHTML = `
        ${header(c)}
        <div class="index-hero">
          <h1>${esc(idx.title)}</h1>
          <p>${esc(idx.sub)}</p>
        </div>
        <div class="index-filters">
          ${idx.filters.map((f, i) => `<button class="filter-chip${i === 0 ? ' is-active' : ''}">${esc(f)}</button>`).join('')}
        </div>
        <div class="guides-grid">
          ${idx.cards.map(card => `
            <a class="guide-card" href="#">
              <div class="guide-card__img">${card.flag}</div>
              <div class="guide-card__body">
                <div class="guide-card__locale">${esc(card.locale)}</div>
                <div class="guide-card__title">${esc(card.title)}</div>
                <div class="guide-card__excerpt">${esc(card.excerpt)}</div>
              </div>
            </a>
          `).join('')}
        </div>
        <footer class="site-footer">© 2026 Htex · htexvisa.com/guides · Preview only</footer>
      `
    }

    function renderTool() {
      const c = COPY[currentLocale]
      const t = TOOL_COPY[uiBundle()]
      document.getElementById('seo-panel').innerHTML = `
        <strong>Tool page SEO</strong><br>
        &lt;title&gt; <span class="val">${esc(t.seoTitle)}</span><br>
        &lt;meta name="description"&gt; <span class="val">${esc(t.seoDesc)}</span><br>
        Schema: <span class="val">HowTo</span> + <span class="val">WebApplication</span>
      `
      document.getElementById('preview-root').innerHTML = `
        ${header(c)}
        <div class="breadcrumb">${esc(t.breadcrumb)}</div>
        <div class="tool-hero">
          <h1>${esc(t.title)}</h1>
          <p style="max-width:480px;margin:10px auto 0;color:var(--ink-2);font-size:15px;line-height:1.6">${esc(t.sub)}</p>
        </div>
        <div class="tool-widget">
          <div class="tool-row">
            <select class="tool-select"><option>${esc(t.nationality)}</option><option>🇮🇩 Indonesia</option><option>🇻🇳 Vietnam</option><option>🇵🇭 Philippines</option><option>🇮🇳 India</option></select>
            <select class="tool-select"><option>${esc(t.destination)}</option><option>🇺🇸 United States (B1/B2)</option><option>🇬🇧 United Kingdom</option><option>🇪🇺 Schengen</option><option>🇦🇺 Australia</option></select>
            <button class="header-cta">${esc(t.cta)}</button>
          </div>
          <h3 style="margin:0 0 12px;font-size:15px">${esc(t.resultTitle)}</h3>
          <ul class="checklist">
            ${c.checklist.slice(0, 5).map(item => `<li><span class="checklist__icon">✓</span><span>${esc(item)}</span></li>`).join('')}
          </ul>
          <div class="cta-card" style="margin-top:16px">
            <h3>${esc(t.upsellTitle)}</h3>
            <p>${esc(t.upsellSub)}</p>
            <button class="cta-card__btn">${esc(t.upsellBtn)}</button>
          </div>
        </div>
        <footer class="site-footer">© 2026 Htex · htexvisa.com/tools/checklist · Preview only</footer>
      `
    }

    function render() {
      if (currentPage === 'guide') renderGuide()
      else if (currentPage === 'index') renderIndex()
      else renderTool()
    }

    function toggleFaq(btn) {
      const item = btn.closest('.faq-item')
      const open = item.classList.contains('is-open')
      document.querySelectorAll('.faq-item').forEach(el => el.classList.remove('is-open'))
      if (!open) item.classList.add('is-open')
    }
    window.toggleFaq = toggleFaq

    document.querySelectorAll('[data-page]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-page]').forEach(b => b.classList.remove('is-active'))
        btn.classList.add('is-active')
        currentPage = btn.dataset.page
        render()
      })
    })

    document.querySelectorAll('[data-locale]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-locale]').forEach(b => b.classList.remove('is-active'))
        btn.classList.add('is-active')
        currentLocale = btn.dataset.locale
        render()
      })
    })

    render()
  </script>
</body>
</html>
