<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Htex · 首页</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { --primary:#3B6EF5; --ink-1:#0F172A; --ink-2:#334155; --ink-3:#64748B; --border:#E2E8F0; --bg-alt:#F8FAFC; --muted:#94A3B8; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--ink-1); background: #fff; }
  .app-header { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:#fff; border-bottom:1px solid var(--border); }
  .app-container { max-width:1200px; margin:0 auto; padding:0 24px; }
  .app-header__brand { display:flex; align-items:center; gap:8px; color:var(--ink-1); font-weight:600; font-size:15px; text-decoration:none; }
  .app-header__brand-mark { width:28px; height:28px; border-radius:8px; background:var(--primary); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-weight:700; }
  .app-header__nav { display:flex; gap:24px; }
  .app-header__nav a { color:var(--ink-2); text-decoration:none; font-size:14px; }
  .app-header__right { display:flex; align-items:center; gap:12px; }
  .lang-switch { padding:4px 10px; border:1px solid var(--border); border-radius:6px; font-size:12px; color:var(--ink-3); }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:6px; font-size:14px; font-weight:500; cursor:pointer; border:none; }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-outline { background:transparent; color:var(--primary); border:1px solid var(--primary); }
  .btn-sm { padding:6px 12px; font-size:13px; }
  .btn-lg { padding:12px 24px; font-size:15px; }
  .app-page { padding:32px 0 64px; }
  .hero { display:grid; grid-template-columns: 1.2fr 1fr; gap:48px; align-items:center; padding:48px 0; }
  .hero__title { font-size:36px; line-height:1.2; margin:0 0 16px; color:var(--ink-1); font-weight:700; }
  .hero__sub { font-size:15px; line-height:1.6; color:var(--ink-3); margin:0 0 32px; }
  .hero__cta { display:flex; gap:12px; }
  .hero__visual { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
  .hero__chip { background:var(--bg-alt); border:1px solid var(--border); border-radius:12px; padding:14px 12px; text-align:center; }
  .hero__chip .flag { font-size:28px; display:block; margin-bottom:4px; }
  .hero__chip .name { font-weight:600; font-size:13px; color:var(--ink-1); }
  .hero__chip .meta { font-size:11px; color:var(--muted); margin-top:2px; }
  .section-title { font-size:24px; text-align:center; margin:40px 0 8px; font-weight:700; }
  .section-sub { text-align:center; color:var(--ink-3); margin:0 0 24px; font-size:14px; }
  .features__grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; }
  .feature-card { border:1px solid var(--border); border-radius:12px; padding:18px; background:#fff; }
  .feature__title { font-size:15px; font-weight:600; margin:0 0 6px; }
  .feature__desc { font-size:13px; color:var(--ink-3); line-height:1.5; margin:0; }
  .footer { padding:24px 0; text-align:center; color:var(--muted); font-size:12px; border-top:1px solid var(--border); margin-top:40px; }
</style>
</head>
<body>
<div data-testid="home-page">
<header class="app-header app-container">
  <a class="app-header__brand" data-testid="app-header__brand">
    <span class="app-header__brand-mark">V</span>
    <span>Htex</span>
  </a>
  <nav class="app-header__nav">
    <a href="#">首页</a>
    <a href="#">个人中心</a>
  </nav>
  <div class="app-header__right">
    <span class="lang-switch">中</span>
    <button class="btn btn-primary btn-sm" data-testid="home-login">登录</button>
  </div>
</header>

<main class="app-container app-page">
  <section class="hero">
    <div class="hero__copy">
      <h1 class="hero__title">签证申请, <br/>从一份材料清单开始</h1>
      <p class="hero__sub">AI 自动识别材料、清单化整理,告别手抄表单。<br/>一次录入,多国复用。</p>
      <div class="hero__cta">
        <button class="btn btn-primary btn-lg" data-testid="home-hero-login">立即登录</button>
        <button class="btn btn-outline btn-lg" data-testid="home-hero-explore">了解功能</button>
      </div>
    </div>
    <div class="hero__visual" data-testid="hero-chips">
      <div class="hero__chip"><span class="flag">🇯🇵</span><span class="name">日本旅游签</span><span class="meta">3-5 工作日</span></div>
      <div class="hero__chip"><span class="flag">🇰🇷</span><span class="name">韩国旅游签</span><span class="meta">5-7 工作日</span></div>
      <div class="hero__chip"><span class="flag">🇹🇭</span><span class="name">泰国落地签</span><span class="meta">1 工作日</span></div>
      <div class="hero__chip"><span class="flag">🇸🇬</span><span class="name">新加坡电子签</span><span class="meta">2-3 工作日</span></div>
    </div>
  </section>

  <h2 class="section-title">四大核心能力</h2>
  <p class="section-sub">从材料识别到 RPA 自动提交,一站式服务</p>
  <div class="features__grid">
    <div class="feature-card">
      <h3 class="feature__title">📷 拍照识别</h3>
      <p class="feature__desc">手机拍证件,AI 自动提取字段</p>
    </div>
    <div class="feature-card">
      <h3 class="feature__title">📋 清单整理</h3>
      <p class="feature__desc">按目的地自动整理材料清单</p>
    </div>
    <div class="feature-card">
      <h3 class="feature__title">✅ 智能校验</h3>
      <p class="feature__desc">字段级校验 + 整改指引</p>
    </div>
    <div class="feature-card">
      <h3 class="feature__title">🤖 RPA 提交</h3>
      <p class="feature__desc">自动化提交到领事馆系统</p>
    </div>
  </div>
</main>

<footer class="footer app-container">
  © 2026 Htex
</footer>
</div>
</body>
</html>
