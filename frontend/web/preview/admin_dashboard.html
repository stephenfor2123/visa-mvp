<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>运营后台 · Admin Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; color: #0F172A; }
  .admin-dashboard { min-height: 100vh; display: grid; grid-template-columns: 220px 1fr; background: #F1F5F9; }
  .admin-sidebar { background: #0F172A; color: #CBD5E1; display: flex; flex-direction: column; padding: 20px 0; }
  .admin-sidebar__brand {
    display: flex; align-items: center; gap: 10px; padding: 0 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,.06); font-weight: 600; font-size: 15px; color: #F8FAFC;
  }
  .admin-sidebar__mark {
    width: 28px; height: 28px; background: #3B6EF5; color: #fff; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px;
  }
  .admin-sidebar__nav { display: flex; flex-direction: column; padding: 12px 8px; gap: 2px; }
  .admin-sidebar__link {
    display: block; padding: 9px 14px; font-size: 14px; color: #CBD5E1;
    text-decoration: none; border-radius: 6px;
  }
  .admin-sidebar__link.is-active { background: #3B6EF5; color: #fff; }
  .admin-sidebar__foot { margin-top: auto; padding: 12px 16px; border-top: 1px solid rgba(255,255,255,.06); }
  .admin-sidebar__logout {
    width: 100%; background: transparent; border: 1px solid rgba(255,255,255,.15); color: #CBD5E1;
    padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .admin-main { padding: 28px 32px; overflow-y: auto; }
  .admin-main__head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
  .admin-main__head h1 { margin: 0; font-size: 22px; font-weight: 700; color: #0F172A; }
  .admin-main__hello { margin: 0; font-size: 13px; color: #64748B; }
  .admin-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .admin-card {
    background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; padding: 16px 18px;
    box-shadow: 0 1px 2px rgba(15,23,42,.04);
  }
  .admin-card__label { font-size: 12px; color: #64748B; text-transform: uppercase; letter-spacing: .5px; }
  .admin-card__value { font-size: 26px; font-weight: 700; color: #0F172A; margin: 6px 0 4px; }
  .admin-card__delta { font-size: 12px; color: #16A34A; }
  .admin-panel { background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; padding: 0; box-shadow: 0 1px 2px rgba(15,23,42,.04); overflow: hidden; }
  .admin-panel h3 { margin: 0; padding: 14px 20px; font-size: 16px; font-weight: 600; border-bottom: 1px solid #E2E8F0; }
  .admin-panel__placeholder { padding: 16px 20px 4px; margin: 0; font-size: 14px; color: #475569; }
  .admin-panel__links { padding: 0 20px 20px; margin: 0; list-style: none; }
  .admin-panel__links a { color: #3B6EF5; text-decoration: none; font-size: 14px; }
</style>
</head>
<body>
<div class="admin-dashboard">
  <aside class="admin-sidebar">
    <div class="admin-sidebar__brand">
      <span class="admin-sidebar__mark">A</span>
      <span>运营后台</span>
    </div>
    <nav class="admin-sidebar__nav">
      <a href="#" class="admin-sidebar__link is-active">总览</a>
      <a href="#" class="admin-sidebar__link">系统设置</a>
    </nav>
    <div class="admin-sidebar__foot">
      <button class="admin-sidebar__logout">退出后台</button>
    </div>
  </aside>

  <main class="admin-main">
    <header class="admin-main__head">
      <h1>运营后台</h1>
      <p class="admin-main__hello">超级管理员</p>
    </header>

    <section class="admin-cards">
      <div class="admin-card">
        <div class="admin-card__label">本月营收</div>
        <div class="admin-card__value">¥128,460</div>
        <div class="admin-card__delta">+12.4%</div>
      </div>
      <div class="admin-card">
        <div class="admin-card__label">订单管理</div>
        <div class="admin-card__value">236</div>
        <div class="admin-card__delta">+8 today</div>
      </div>
      <div class="admin-card">
        <div class="admin-card__label">用户管理</div>
        <div class="admin-card__value">1,204</div>
        <div class="admin-card__delta">+34 this week</div>
      </div>
    </section>

    <div class="admin-panel">
      <h3>总览</h3>
      <p class="admin-panel__placeholder">Welcome, <b>admin</b>. This dashboard will surface orders, users, and RPA health in upcoming stories.</p>
      <ul class="admin-panel__links">
        <li><a href="#">系统设置 →</a></li>
      </ul>
    </div>
  </main>
</div>
</body>
</html>
