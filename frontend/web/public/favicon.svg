<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B6EF5"/>
      <stop offset="1" stop-color="#6E59F0"/>
    </linearGradient>
  </defs>
  <!-- rounded square brand mark, matches AppHeader gradient chip -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- bold "H" word-mark, Helvetica/Inter style sans-serif, white -->
  <text x="32" y="44" text-anchor="middle"
        font-family="-apple-system, 'Helvetica Neue', Helvetica, Inter, Arial, sans-serif"
        font-weight="800" font-size="36" fill="#ffffff"
        letter-spacing="-1">H</text>
</svg>