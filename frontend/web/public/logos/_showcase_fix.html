<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Htex e 字符明显版</title>
<style>
  body { margin:0; padding:40px; background:#F8FAFC; font-family:-apple-system,sans-serif; color:#0F172A; }
  h1 { font-size:22px; margin:0 0 8px; }
  .sub { font-size:13px; color:#64748B; margin-bottom:32px; }
  .grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:24px; max-width:1100px; }
  .card { background:#fff; border:1px solid #E2E8F0; border-radius:16px; padding:24px 28px; }
  .card-title { font-size:11px; font-weight:700; color:#64748B; text-transform:uppercase; letter-spacing:.04em; margin-bottom:18px; }
  .row { display:flex; align-items:flex-end; gap:20px; padding:18px 12px; background:#F8FAFC; border-radius:10px; margin-bottom:10px; flex-wrap:wrap; }
  .row .lbl { font-size:10px; color:#94A3B8; font-family:ui-monospace,monospace; }
  .row img { display:block; }
</style></head>
<body>
<h1>Htex Logo · e 字符明显版</h1>
<div class="sub">修复"看起来像 htox"问题 — 缩小圆环 / 圆环挪位置 / 去掉圆环,让 e 字符字形清晰可见。</div>

<div class="grid">

  <div class="card">
    <div class="card-title">fix v1 · 圆环缩小 r=6.5,e 字符横线在圆环下方清晰</div>
    <div class="row">
      <img src="/logos/fix_v1_small_ring.svg" width="120" height="40">
      <div class="lbl">120px</div>
      <img src="/logos/fix_v1_small_ring.svg" width="240" height="80">
      <div class="lbl">240px</div>
      <img src="/logos/fix_v1_small_ring.svg" width="360" height="120">
      <div class="lbl">360px</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">fix v2 · 圆环 + 飞机作为 e 字符上方"重音"(e 字符完全保留)</div>
    <div class="row">
      <img src="/logos/fix_v2_above_e.svg" width="120" height="40">
      <div class="lbl">120px</div>
      <img src="/logos/fix_v2_above_e.svg" width="240" height="80">
      <div class="lbl">240px</div>
      <img src="/logos/fix_v2_above_e.svg" width="360" height="120">
      <div class="lbl">360px</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">fix v3 · 只有飞机在 e 字符中央(无圆环,e 字形完全可见)</div>
    <div class="row">
      <img src="/logos/fix_v3_plane_only.svg" width="120" height="40">
      <div class="lbl">120px</div>
      <img src="/logos/fix_v3_plane_only.svg" width="240" height="80">
      <div class="lbl">240px</div>
      <img src="/logos/fix_v3_plane_only.svg" width="360" height="120">
      <div class="lbl">360px</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">fix v4 · 圆环 r=7 居中,e 横线在圆环上方可见(经典 e 字形)</div>
    <div class="row">
      <img src="/logos/fix_v4_ring_above_bar.svg" width="120" height="40">
      <div class="lbl">120px</div>
      <img src="/logos/fix_v4_ring_above_bar.svg" width="240" height="80">
      <div class="lbl">240px</div>
      <img src="/logos/fix_v4_ring_above_bar.svg" width="360" height="120">
      <div class="lbl">360px</div>
    </div>
  </div>

</div>
</body></html>
