<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80" role="img" aria-label="Htex logo with paper plane inside e">
  <defs>
    <style>
      .htex-text {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "PingFang SC", "Inter", Arial, sans-serif;
        font-weight: 900;
        font-size: 64px;
        letter-spacing: -2px;
      }
    </style>
  </defs>

  <!-- 黑色 Htex 文字 -->
  <text x="20" y="60" class="htex-text" fill="#000">Htex</text>

  <!-- e 字符中央(实测 cx=111, cy=39.5),覆盖白底圆环 + 飞机 -->
  <g transform="translate(111, 40)">
    <circle cx="0" cy="0" r="11" fill="#fff" stroke="#000" stroke-width="2.6"/>
    <path d="M -4.5 -2 L 4.5 0 L -4.5 2 L -1 0 Z" fill="#000"/>
    <line x1="-4.5" y1="-2" x2="-1" y2="0" stroke="#fff" stroke-width="0.6"/>
    <line x1="-4.5" y1="2" x2="-1" y2="0" stroke="#fff" stroke-width="0.6"/>
  </g>
</svg>
