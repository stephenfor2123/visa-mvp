<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Htex 字体版 + 纸飞机</title>
<style>
  body { margin:0; padding:40px; background:#F8FAFC; font-family:-apple-system,sans-serif; color:#0F172A; }
  h1 { font-size:22px; margin:0 0 8px; }
  .sub { font-size:13px; color:#64748B; margin-bottom:32px; }
  .grid { display:grid; grid-template-columns:repeat(1, 1fr); gap:24px; max-width:900px; }
  .card { background:#fff; border:1px solid #E2E8F0; border-radius:16px; padding:24px 28px; }
  .card-title { font-size:11px; font-weight:700; color:#64748B; text-transform:uppercase; letter-spacing:.04em; margin-bottom:18px; }
  .row { display:flex; align-items:flex-end; gap:20px; padding:18px 12px; background:#F8FAFC; border-radius:10px; margin-bottom:10px; flex-wrap:wrap; }
  .row .lbl { font-size:10px; color:#94A3B8; font-family:ui-monospace,monospace; }
  .row img { display:block; }
  .dark { background:#0F172A; border-color:#1E293B; }
  .dark .row { background:#1E293B; }
  .dark .lbl { color:#64748B !important; }
  .dark .card-title { color:#94A3B8; }
</style></head>
<body>
<h1>Htex Logo · 字体 + 纸飞机</h1>
<div class="sub">Htex 用 sans-serif 字体,纯黑。纸飞机放在 e 字符的中央 / 上方。三种放法。</div>

<div class="grid">

  <div class="card">
    <div class="card-title">final v1 · 纸飞机在 e 字符中央(白底圆环覆盖 + 飞机)</div>
    <div class="row">
      <img src="/logos/final_v1_text_plane.svg" width="96" height="32">
      <div class="lbl">96px</div>
      <img src="/logos/final_v1_text_plane.svg" width="144" height="48">
      <div class="lbl">144px</div>
      <img src="/logos/final_v1_text_plane.svg" width="240" height="80">
      <div class="lbl">240px</div>
      <img src="/logos/final_v1_text_plane.svg" width="360" height="120">
      <div class="lbl">360px</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">final v2 · 同 v1 + 飞机绕 e 中央圆环飞行(动效)</div>
    <div class="row">
      <img src="/logos/final_v2_text_plane_anim.svg" width="96" height="32">
      <div class="lbl">96px</div>
      <img src="/logos/final_v2_text_plane_anim.svg" width="144" height="48">
      <div class="lbl">144px</div>
      <img src="/logos/final_v2_text_plane_anim.svg" width="240" height="80">
      <div class="lbl">240px</div>
      <img src="/logos/final_v2_text_plane_anim.svg" width="360" height="120">
      <div class="lbl">360px</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">final v3 · 飞机作为重音符号在 e 字符右上方(无圆环,极简)</div>
    <div class="row">
      <img src="/logos/final_v3_text_plane_accent.svg" width="96" height="32">
      <div class="lbl">96px</div>
      <img src="/logos/final_v3_text_plane_accent.svg" width="144" height="48">
      <div class="lbl">144px</div>
      <img src="/logos/final_v3_text_plane_accent.svg" width="240" height="80">
      <div class="lbl">240px</div>
      <img src="/logos/final_v3_text_plane_accent.svg" width="360" height="120">
      <div class="lbl">360px</div>
    </div>
  </div>

</div>
</body></html>
