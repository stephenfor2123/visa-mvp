<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Htex boarding pass">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B6EF5"/>
      <stop offset="1" stop-color="#6E59F0"/>
    </linearGradient>
  </defs>
  <!-- 主券(深色大块) -->
  <rect x="2" y="6" width="20" height="20" rx="3" fill="url(#g1)"/>
  <!-- 撕齿孔(左中、右中) -->
  <circle cx="2" cy="16" r="1.6" fill="#fff"/>
  <circle cx="22" cy="16" r="1.6" fill="#fff"/>
  <!-- 副券(浅色) -->
  <rect x="24" y="6" width="6" height="20" rx="2" fill="#fff" stroke="#3B6EF5" stroke-width="1.2"/>
  <!-- 撕齿虚线(主副券之间) -->
  <line x1="23" y1="9" x2="23" y2="23" stroke="#fff" stroke-width="0.7" stroke-dasharray="1.2,1.2"/>
  <!-- H 字母(主券里) -->
  <g fill="#fff">
    <rect x="7"  y="11" width="2"   height="10" rx="0.5"/>
    <rect x="15" y="11" width="2"   height="10" rx="0.5"/>
    <rect x="7"  y="14.5" width="10" height="2"   rx="0.5"/>
  </g>
  <!-- 副券里的小字"H" -->
  <text x="27" y="19.5" font-size="6" font-weight="700" fill="#3B6EF5" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif">H</text>
</svg>
