<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Htex app icon palm H and plane orbit e">
  <defs>
    <linearGradient id="g-app" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB088"/>
      <stop offset="0.5" stop-color="#FF8E72"/>
      <stop offset="1" stop-color="#7C6BE0"/>
    </linearGradient>
    <linearGradient id="leaf-app" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="32" height="32" rx="7" fill="url(#g-app)"/>

  <!-- 远山 -->
  <path d="M 0 24 L 6 19 L 11 22 L 17 18 L 23 21 L 28 19 L 32 24 Z" fill="#5B4F8C" opacity="0.45"/>

  <!-- 太阳(右上角) -->
  <circle cx="26" cy="9" r="2.5" fill="#FFD66B" opacity="0.95"/>
  <circle cx="26" cy="9" r="3.5" fill="none" stroke="#FFD66B" stroke-width="0.4" opacity="0.5"/>

  <!-- 左椰子树 -->
  <g>
    <path d="M 8 26 Q 8.4 22, 8 18" stroke="#8B6F47" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    <circle cx="9.4" cy="17.5" r="0.6" fill="#5C3E22"/>
    <circle cx="6.6" cy="17.5" r="0.6" fill="#5C3E22"/>
    <path d="M 8 18 Q 3 15, 1.5 16 Q 3 13.5, 8 17 Z" fill="url(#leaf-app)"/>
    <path d="M 8 18 Q 13 15, 14.5 16 Q 13 13.5, 8 17 Z" fill="url(#leaf-app)"/>
    <path d="M 8 18 Q 4 12, 2.5 8 Q 5 11, 8 17 Z" fill="url(#leaf-app)" opacity="0.9"/>
    <path d="M 8 18 Q 12 12, 13.5 8 Q 11 11, 8 17 Z" fill="url(#leaf-app)" opacity="0.9"/>
    <path d="M 8 18 Q 7.5 12, 7.5 7 Q 8 11, 8 17 Z" fill="url(#leaf-app)"/>
  </g>

  <!-- 右椰子树 -->
  <g>
    <path d="M 19 26 Q 19.4 22, 19 18" stroke="#8B6F47" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    <circle cx="20.4" cy="17.5" r="0.6" fill="#5C3E22"/>
    <circle cx="17.6" cy="17.5" r="0.6" fill="#5C3E22"/>
    <path d="M 19 18 Q 14 15, 12.5 16 Q 14 13.5, 19 17 Z" fill="url(#leaf-app)"/>
    <path d="M 19 18 Q 24 15, 25.5 16 Q 24 13.5, 19 17 Z" fill="url(#leaf-app)"/>
    <path d="M 19 18 Q 15 12, 13.5 8 Q 16 11, 19 17 Z" fill="url(#leaf-app)" opacity="0.9"/>
    <path d="M 19 18 Q 23 12, 24.5 8 Q 22 11, 19 17 Z" fill="url(#leaf-app)" opacity="0.9"/>
    <path d="M 19 18 Q 18.5 12, 18.5 7 Q 19 11, 19 17 Z" fill="url(#leaf-app)"/>
  </g>

  <!-- 海平面 = H 横线 -->
  <line x1="0" y1="26" x2="32" y2="26" stroke="#fff" stroke-width="0.5" opacity="0.5"/>

  <!-- e 字母 = 飞机绕圈(中央前景) -->
  <g transform="translate(13.5, 11)">
    <circle cx="0" cy="0" r="3.2" fill="none" stroke="#fff" stroke-width="0.4" stroke-dasharray="0.8,0.6" opacity="0.7"/>
    <path d="M 2 -1.4 A 3.2 3.2 0 1 0 2.2 2.2" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
    <path d="M 2.2 2.2 L 4.4 -1 L 2.8 -0.4 L 2.6 -1.6 Z" fill="#FFD66B" stroke="#fff" stroke-width="0.4" stroke-linejoin="round"/>
  </g>
</svg>
