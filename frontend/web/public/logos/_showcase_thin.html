<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Htex 瘦 e + 飞机</title>
<style>
  body { margin:0; padding:40px; background:#F8FAFC; font-family:-apple-system,sans-serif; color:#0F172A; }
  h1 { font-size:22px; margin:0 0 8px; }
  .sub { font-size:13px; color:#64748B; margin-bottom:32px; }
  .grid { display:grid; grid-template-columns:repeat(1, 1fr); gap:24px; max-width:900px; }
  .card { background:#fff; border:1px solid #E2E8F0; border-radius:16px; padding:24px 28px; }
  .card-title { font-size:11px; font-weight:700; color:#64748B; text-transform:uppercase; letter-spacing:.04em; margin-bottom:18px; }
  .row { display:flex; align-items:flex-end; gap:20px; padding:18px 12px; background:#F8FAFC; border-radius:10px; margin-bottom:10px; flex-wrap:wrap; }
  .row .lbl { font-size:10px; color:#94A3B8; font-family:ui-monospace,monospace; }
  .row img { display:block; }
</style></head>
<body>
<h1>Htex Logo · 瘦 e + 飞机在 e 笔画里飞</h1>
<div class="sub">H/t/x 用粗笔画,e 字符用 path 画瘦长字形(8 宽 × 14 高,标准 e 字形),飞机沿 e 笔画(横线 + 椭圆弧)飞。</div>

<div class="grid">

  <div class="card">
    <div class="card-title">thin v1 · 静态版:飞机停在 e 字符横线右端(准备"飞")</div>
    <div class="row">
      <img src="/logos/thin_v1_static.svg" width="120" height="40">
      <div class="lbl">120px</div>
      <img src="/logos/thin_v1_static.svg" width="240" height="80">
      <div class="lbl">240px</div>
      <img src="/logos/thin_v1_static.svg" width="360" height="120">
      <div class="lbl">360px</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">thin v2 · 动效版:飞机沿 e 字符笔画(横线 → 椭圆弧)飞行</div>
    <div class="row">
      <img src="/logos/thin_v2_anim.svg" width="120" height="40">
      <div class="lbl">120px</div>
      <img src="/logos/thin_v2_anim.svg" width="240" height="80">
      <div class="lbl">240px</div>
      <img src="/logos/thin_v2_anim.svg" width="360" height="120">
      <div class="lbl">360px</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">thin v3 · 飞机作为 e 字符上方重音(最简,无圆环)</div>
    <div class="row">
      <img src="/logos/thin_v3_accent.svg" width="120" height="40">
      <div class="lbl">120px</div>
      <img src="/logos/thin_v3_accent.svg" width="240" height="80">
      <div class="lbl">240px</div>
      <img src="/logos/thin_v3_accent.svg" width="360" height="120">
      <div class="lbl">360px</div>
    </div>
  </div>

</div>
</body></html>
