<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 32" width="64" height="32" role="img" aria-label="Htex palm H stamp">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF9A8B"/>
      <stop offset="0.6" stop-color="#FF6A88"/>
      <stop offset="1" stop-color="#FF99AC"/>
    </linearGradient>
    <linearGradient id="leaf4" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- 票根主体(细长票根) -->
  <rect x="1" y="9" width="62" height="14" rx="7" fill="url(#sky4)"/>
  <!-- 双白线边框 -->
  <rect x="2.5" y="10.5" width="59" height="11" rx="5.5" fill="none" stroke="#fff" stroke-width="0.5"/>
  <rect x="3.5" y="11.5" width="57" height="9" rx="4.5" fill="none" stroke="#fff" stroke-width="0.4" opacity="0.7"/>
  <!-- 撕齿 -->
  <circle cx="32" cy="9" r="1.5" fill="#fff"/>
  <circle cx="32" cy="23" r="1.5" fill="#fff"/>
  <line x1="32" y1="12" x2="32" y2="20" stroke="#fff" stroke-width="0.5" stroke-dasharray="1,1" opacity="0.7"/>

  <!-- 左侧:小椰子树(细长版) -->
  <g>
    <path d="M 8 21 Q 8.4 18, 8 15" stroke="#5C3E22" stroke-width="0.9" stroke-linecap="round" fill="none"/>
    <circle cx="9" cy="14.5" r="0.5" fill="#5C3E22"/>
    <circle cx="7" cy="14.5" r="0.5" fill="#5C3E22"/>
    <path d="M 8 14 Q 4 11, 2.5 12 Q 4 10, 8 13.5 Z" fill="url(#leaf4)"/>
    <path d="M 8 14 Q 12 11, 13.5 12 Q 12 10, 8 13.5 Z" fill="url(#leaf4)"/>
    <path d="M 8 14 Q 5 8, 4 5 Q 6 7, 8 13.5 Z" fill="url(#leaf4)" opacity="0.95"/>
    <path d="M 8 14 Q 11 8, 12 5 Q 10 7, 8 13.5 Z" fill="url(#leaf4)" opacity="0.95"/>
    <path d="M 8 14 Q 7.5 7, 7.5 3 Q 8 7, 8 13.5 Z" fill="url(#leaf4)"/>
  </g>

  <!-- 右侧:tex -->
  <text x="46" y="18" font-size="6.5" font-weight="800" fill="#fff" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" letter-spacing="-0.2">tex</text>
  <!-- 副券小飞机 -->
  <path d="M 49 12 L 54 13.2 L 49 14.4 L 50 13.2 Z" fill="#fff" opacity="0.9"/>
  <!-- 副券小浪 -->
  <path d="M 40 19.5 Q 43 19, 46 19.5 T 52 19.5 T 58 19.5" stroke="#fff" stroke-width="0.4" fill="none" opacity="0.7"/>

  <!-- 顶/底装饰线 -->
  <line x1="3" y1="6" x2="61" y2="6" stroke="#3B6EF5" stroke-width="0.4" stroke-linecap="round" opacity="0.5"/>
  <line x1="3" y1="26" x2="61" y2="26" stroke="#3B6EF5" stroke-width="0.4" stroke-linecap="round" opacity="0.5"/>
</svg>
