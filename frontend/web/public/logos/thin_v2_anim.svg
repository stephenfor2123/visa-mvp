<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80" role="img" aria-label="Htex logo thin e with plane flying along e stroke">
  <defs>
    <mask id="e-mask2">
      <rect width="240" height="80" fill="white"/>
      <path d="M 124 50 L 138 36" stroke="black" stroke-width="5" stroke-linecap="round" fill="none"/>
    </mask>
    <style>
      #thin2 .plane {
        offset-path: path("M 138 36 L 116 36 A 11 16 0 1 1 124 50");
        offset-rotate: auto;
        animation: thin2-orbit 4s linear infinite;
      }
      @keyframes thin2-orbit {
        0%   { offset-distance: 0%; }
        100% { offset-distance: 100%; }
      }
    </style>
  </defs>

  <g id="thin2">
    <g stroke="#000" stroke-linecap="round" fill="none">
      <line x1="20" y1="14" x2="20" y2="52" stroke-width="4.5"/>
      <line x1="46" y1="14" x2="46" y2="52" stroke-width="4.5"/>
      <line x1="20" y1="33" x2="46" y2="33" stroke-width="4.5"/>
      <line x1="68" y1="18" x2="68" y2="52" stroke-width="4.5"/>
      <line x1="58" y1="26" x2="78" y2="26" stroke-width="4.5"/>
      <g mask="url(#e-mask2)">
        <ellipse cx="127" cy="36" rx="11" ry="16" stroke-width="3.5"/>
        <line x1="116" y1="36" x2="138" y2="36" stroke-width="3.5"/>
      </g>
      <line x1="160" y1="22" x2="200" y2="52" stroke-width="4.5"/>
      <line x1="200" y1="22" x2="160" y2="52" stroke-width="4.5"/>
    </g>
    <g class="plane">
      <path d="M -4 -2 L 4 0 L -4 2 L -1 0 Z" fill="#000"/>
      <line x1="-4" y1="-2" x2="-1" y2="0" stroke="#fff" stroke-width="0.6"/>
      <line x1="-4" y1="2" x2="-1" y2="0" stroke="#fff" stroke-width="0.6"/>
    </g>
  </g>
</svg>
