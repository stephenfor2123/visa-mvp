<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Htex boarding pass modern">
  <defs>
    <linearGradient id="g6" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B6EF5"/>
      <stop offset="1" stop-color="#6E59F0"/>
    </linearGradient>
  </defs>
  <!-- 主券(横版,占 70%) -->
  <rect x="1.5" y="5" width="20" height="22" rx="3" fill="url(#g6)"/>
  <!-- 副券(右侧,占 30%) -->
  <rect x="22.5" y="5" width="8" height="22" rx="2" fill="#fff" stroke="#3B6EF5" stroke-width="1.2"/>
  <!-- 撕齿孔(中间上下) -->
  <circle cx="22" cy="5"  r="1.5" fill="#fff"/>
  <circle cx="22" cy="27" r="1.5" fill="#fff"/>
  <!-- H(主券里,左对齐) -->
  <g fill="#fff">
    <rect x="5"  y="11"   width="2.2" height="10" rx="0.5"/>
    <rect x="13" y="11"   width="2.2" height="10" rx="0.5"/>
    <rect x="5"  y="14.5" width="10.2" height="2.2" rx="0.5"/>
  </g>
  <!-- 飞机(在 H 旁边) -->
  <path d="M 19 8 L 23 10 L 19 12 L 20 10 Z" fill="#fff" opacity="0.9"/>
  <!-- 副券 QR 占位 -->
  <g fill="#3B6EF5">
    <rect x="24" y="9"  width="5" height="5"/>
  </g>
  <g fill="#fff">
    <rect x="25" y="10" width="1" height="1"/>
    <rect x="27" y="10" width="1" height="1"/>
    <rect x="25" y="12" width="1" height="1"/>
    <rect x="27" y="12" width="1" height="1"/>
  </g>
  <!-- 副券下方 Htex 小字 -->
  <text x="26.5" y="22" font-size="4" font-weight="700" fill="#3B6EF5" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif">Htex</text>
</svg>
