<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Htex 字体版 + 细 e</title>
<style>
  body { margin:0; padding:40px; background:#F8FAFC; font-family:-apple-system,sans-serif; color:#0F172A; }
  h1 { font-size:22px; margin:0 0 8px; }
  .sub { font-size:13px; color:#64748B; margin-bottom:32px; }
  .grid { display:grid; grid-template-columns:repeat(1, 1fr); gap:24px; max-width:900px; }
  .card { background:#fff; border:1px solid #E2E8F0; border-radius:16px; padding:24px 28px; }
  .card-title { font-size:11px; font-weight:700; color:#64748B; text-transform:uppercase; letter-spacing:.04em; margin-bottom:18px; }
  .row { display:flex; align-items:flex-end; gap:20px; padding:18px 12px; background:#F8FAFC; border-radius:10px; margin-bottom:10px; flex-wrap:wrap; }
  .row .lbl { font-size:10px; color:#94A3B8; font-family:ui-monospace,monospace; }
  .row img { display:block; }
</style></head>
<body>
<h1>Htex Logo · H t x 字体 + e path 细窄</h1>
<div class="sub">H/t/x 用 sans-serif 字体(粗体),e 用 path 画细窄字形(8 宽 × 15 高,带右下开口),飞机在 e 笔画里。</div>

<div class="grid">

  <div class="card">
    <div class="card-title">final2 v1 · 静态:飞机在 e 字符中央</div>
    <div class="row">
      <img src="/logos/final2_v1_static.svg" width="100" height="40">
      <div class="lbl">100px</div>
      <img src="/logos/final2_v1_static.svg" width="200" height="80">
      <div class="lbl">200px</div>
      <img src="/logos/final2_v1_static.svg" width="300" height="120">
      <div class="lbl">300px</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">final2 v2 · 动效:飞机沿 e 笔画(横线 + 椭圆)循环飞</div>
    <div class="row">
      <img src="/logos/final2_v2_anim.svg" width="100" height="40">
      <div class="lbl">100px</div>
      <img src="/logos/final2_v2_anim.svg" width="200" height="80">
      <div class="lbl">200px</div>
      <img src="/logos/final2_v2_anim.svg" width="300" height="120">
      <div class="lbl">300px</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">final2 v3 · 飞机作为 e 字符上方重音(最简)</div>
    <div class="row">
      <img src="/logos/final2_v3_accent.svg" width="100" height="40">
      <div class="lbl">100px</div>
      <img src="/logos/final2_v3_accent.svg" width="200" height="80">
      <div class="lbl">200px</div>
      <img src="/logos/final2_v3_accent.svg" width="300" height="120">
      <div class="lbl">300px</div>
    </div>
  </div>

</div>
</body></html>
