<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64" role="img" aria-label="Htex black sans-serif text with plane orbit e">
  <defs>
    <style>
      #text-logo .plane {
        offset-path: path("M 144 20 A 16 16 0 1 1 143.99 20");
        offset-rotate: auto;
        animation: text-orbit 4s linear infinite;
      }
      #text-logo .trail {
        animation: text-trail 4s linear infinite;
        transform-origin: 144px 36px;
      }
      @keyframes text-orbit {
        0% { offset-distance: 0%; }
        100% { offset-distance: 100%; }
      }
      @keyframes text-trail {
        0% { opacity: 0; }
        15% { opacity: 0.5; }
        85% { opacity: 0.5; }
        100% { opacity: 0; }
      }
    </style>
  </defs>

  <g id="text-logo">
    <!-- 黑色 Htex 文字(大写 H,中等字重,几何 sans-serif 风格) -->
    <text x="14" y="50" font-family="-apple-system, 'Helvetica Neue', 'Inter', 'PingFang SC', sans-serif"
          font-size="46" font-weight="900" fill="#000" letter-spacing="-1.5">Ht</text>

    <!-- 覆盖在 e 位置的圆环(让 e 看起来是个圈) -->
    <circle cx="144" cy="36" r="16" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round"/>
    <!-- 圆环尾迹 -->
    <circle class="trail" cx="144" cy="36" r="13" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="1,1.5" opacity="0"/>

    <!-- x 字母 -->
    <text x="172" y="50" font-family="-apple-system, 'Helvetica Neue', 'Inter', 'PingFang SC', sans-serif"
          font-size="46" font-weight="900" fill="#000" letter-spacing="-1.5">x</text>

    <!-- 飞机(沿 e 圆环飞) -->
    <g class="plane">
      <path d="M -5 -2.5 L 5 0 L -5 2.5 L -2 0 Z" fill="#000"/>
    </g>
  </g>
</svg>
