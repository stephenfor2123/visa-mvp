<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Htex Logo 200px 对比</title>
<style>
  body { margin:0; padding:40px; background:#F8FAFC; font-family:-apple-system,sans-serif; }
  h1 { font-size:24px; margin:0 0 24px; }
  .row { display:flex; gap:32px; align-items:center; flex-wrap:wrap; }
  .item { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .item img { width:200px; height:200px; display:block; }
  .item .name { font-size:13px; color:#64748B; font-family:ui-monospace,monospace; }
  .label { font-size:11px; color:#94A3B8; text-transform:uppercase; letter-spacing:.06em; }
</style></head>
<body>
  <h1>Htex Logo · 8 变体 200px 对比</h1>
  <div class="label" style="margin-bottom:24px">左到右:v1 v2 v3 v4 v5 v6 v7 v8</div>
  <div class="row">
    <div class="item"><img src="/logos/v1_boarding_pass.svg" alt=""><div class="name">v1 Boarding</div></div>
    <div class="item"><img src="/logos/v2_postage_stamp.svg" alt=""><div class="name">v2 Postage</div></div>
    <div class="item"><img src="/logos/v3_luggage_tag.svg" alt=""><div class="name">v3 Luggage</div></div>
    <div class="item"><img src="/logos/v4_passport.svg" alt=""><div class="name">v4 Passport</div></div>
    <div class="item"><img src="/logos/v5_ticket_stub.svg" alt=""><div class="name">v5 Ticket</div></div>
    <div class="item"><img src="/logos/v6_boarding_modern.svg" alt=""><div class="name">v6 Boarding QR</div></div>
    <div class="item"><img src="/logos/v7_vintage_ticket.svg" alt=""><div class="name">v7 Vintage</div></div>
    <div class="item"><img src="/logos/v8_ticket_slanted.svg" alt=""><div class="name">v8 Slanted</div></div>
  </div>
</body></html>
