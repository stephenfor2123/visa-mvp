<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 32" width="64" height="32" role="img" aria-label="Htex boarding H tex split with QR">
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="64" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B6EF5"/>
      <stop offset="1" stop-color="#6E59F0"/>
    </linearGradient>
  </defs>
  <!-- 主券(H 区,深色 70%) -->
  <rect x="1" y="5" width="42" height="22" rx="3" fill="url(#g3)"/>
  <!-- H 大字 -->
  <g fill="#fff">
    <rect x="9"  y="11"   width="3"   height="14" rx="0.6"/>
    <rect x="22" y="11"   width="3"   height="14" rx="0.6"/>
    <rect x="9"  y="16.5" width="16"  height="3"   rx="0.6"/>
  </g>
  <!-- 飞机 -->
  <path d="M 30 7.5 L 36 9.5 L 30 11.5 L 31 9.5 Z" fill="#fff" opacity="0.9"/>
  <!-- 假信息条(BOARD / TIME) -->
  <line x1="7" y1="23" x2="20" y2="23" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
  <line x1="25" y1="23" x2="38" y2="23" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
  <!-- 撕齿孔 -->
  <circle cx="44" cy="5" r="1.8" fill="#fff"/>
  <circle cx="44" cy="27" r="1.8" fill="#fff"/>
  <!-- 撕齿虚线 -->
  <line x1="44" y1="9" x2="44" y2="23" stroke="#fff" stroke-width="0.5" stroke-dasharray="1,1"/>
  <!-- 副券(tex 区,白底) -->
  <rect x="46" y="5" width="17" height="22" rx="2.5" fill="#fff" stroke="#3B6EF5" stroke-width="0.8"/>
  <!-- QR 占位 -->
  <g fill="#3B6EF5">
    <rect x="48" y="7.5" width="5.5" height="5.5"/>
  </g>
  <g fill="#fff">
    <rect x="49" y="8.5" width="1" height="1"/>
    <rect x="51.5" y="8.5" width="1" height="1"/>
    <rect x="49" y="11" width="1" height="1"/>
    <rect x="51.5" y="11" width="1" height="1"/>
  </g>
  <!-- tex 文字 -->
  <text x="54.5" y="20" font-size="9" font-weight="800" fill="#3B6EF5" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" letter-spacing="-0.2">tex</text>
  <!-- 副券装饰线 -->
  <line x1="48" y1="22.5" x2="61" y2="22.5" stroke="#3B6EF5" stroke-width="0.4" opacity="0.5"/>
</svg>
