<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80" role="img" aria-label="Htex logo with thin path e and plane above">
  <defs>
    <style>
      .htex-htx3 {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "PingFang SC", "Inter", Arial, sans-serif;
        font-weight: 900;
        font-size: 60px;
        letter-spacing: -2px;
      }
    </style>
    <mask id="e-mask-v3">
      <rect width="200" height="80" fill="white"/>
      <path d="M 102 50 L 113 38" stroke="black" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    </mask>
  </defs>

  <text x="18" y="58" class="htex-htx3" fill="#000">Ht</text>
  <text x="148" y="58" class="htex-htx3" fill="#000">x</text>

  <g stroke="#000" stroke-linecap="round" fill="none" mask="url(#e-mask-v3)">
    <ellipse cx="105" cy="38" rx="8" ry="15" stroke-width="3.2"/>
    <line x1="97" y1="38" x2="113" y2="38" stroke-width="3.2"/>
  </g>

  <!-- 飞机作为 e 字符上方重音 -->
  <g transform="translate(105, 14)">
    <path d="M 0 0 L 12 3 L 1 6 L 3 4 Z" fill="#000"/>
  </g>
</svg>
