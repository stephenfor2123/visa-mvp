<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 32" width="64" height="32" role="img" aria-label="Htex palm H minimalist">
  <defs>
    <!-- 干净的天空渐变 -->
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5C9E8"/>
      <stop offset="1" stop-color="#5B7FBE"/>
    </linearGradient>
    <linearGradient id="leaf3" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#16A34A"/>
      <stop offset="1" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
  </defs>

  <!-- H 票根主区(白天海景) -->
  <rect x="1" y="6" width="40" height="20" rx="3" fill="url(#sky3)"/>
  <!-- 云 -->
  <ellipse cx="20" cy="11" rx="4" ry="1.2" fill="#fff" opacity="0.6"/>
  <ellipse cx="35" cy="9" rx="3" ry="0.9" fill="#fff" opacity="0.5"/>
  <!-- 海平面 = H 横线 -->
  <rect x="1" y="22" width="40" height="4" fill="url(#ocean)"/>
  <path d="M 1 22 Q 5 21, 9 22 T 17 22 T 25 22 T 33 22 T 41 22" stroke="#fff" stroke-width="0.4" fill="none" opacity="0.7"/>
  <path d="M 1 24 Q 6 23.5, 10 24 T 18 24 T 26 24 T 34 24 T 41 24" stroke="#fff" stroke-width="0.3" fill="none" opacity="0.5"/>

  <!-- 左侧椰子树(H 左竖,种在沙滩上) -->
  <g>
    <path d="M 9 22 Q 9.5 18, 9 13" stroke="#8B6F47" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <circle cx="10.5" cy="13" r="0.8" fill="#5C3E22"/>
    <circle cx="7.5" cy="13" r="0.8" fill="#5C3E22"/>
    <path d="M 9 13 Q 3 9, 1 11 Q 3 8, 9 12 Z" fill="url(#leaf3)"/>
    <path d="M 9 13 Q 15 9, 17 11 Q 15 8, 9 12 Z" fill="url(#leaf3)"/>
    <path d="M 9 13 Q 4 6, 2 1 Q 5 5, 9 12 Z" fill="url(#leaf3)" opacity="0.95"/>
    <path d="M 9 13 Q 14 6, 16 1 Q 13 5, 9 12 Z" fill="url(#leaf3)" opacity="0.95"/>
    <path d="M 9 13 Q 8 5, 8 0 Q 9.5 5, 9 12 Z" fill="url(#leaf3)"/>
  </g>
  <!-- 右椰子树 -->
  <g>
    <path d="M 27 22 Q 27.5 18, 27 13" stroke="#8B6F47" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <circle cx="28.5" cy="13" r="0.8" fill="#5C3E22"/>
    <circle cx="25.5" cy="13" r="0.8" fill="#5C3E22"/>
    <path d="M 27 13 Q 21 9, 19 11 Q 21 8, 27 12 Z" fill="url(#leaf3)"/>
    <path d="M 27 13 Q 33 9, 35 11 Q 33 8, 27 12 Z" fill="url(#leaf3)"/>
    <path d="M 27 13 Q 22 6, 20 1 Q 23 5, 27 12 Z" fill="url(#leaf3)" opacity="0.95"/>
    <path d="M 27 13 Q 32 6, 34 1 Q 31 5, 27 12 Z" fill="url(#leaf3)" opacity="0.95"/>
    <path d="M 27 13 Q 26 5, 26 0 Q 27.5 5, 27 12 Z" fill="url(#leaf3)"/>
  </g>

  <!-- 撕齿 -->
  <circle cx="42" cy="6" r="1.8" fill="#fff"/>
  <circle cx="42" cy="26" r="1.8" fill="#fff"/>
  <line x1="42" y1="10" x2="42" y2="22" stroke="#fff" stroke-width="0.6" stroke-dasharray="1.2,1.2"/>

  <!-- tex 副券(白底 + 飞机 + 浪) -->
  <rect x="44" y="6" width="19" height="20" rx="2.5" fill="#fff" stroke="#3B6EF5" stroke-width="0.8"/>
  <!-- 飞机 -->
  <path d="M 49 9 L 56 10.5 L 49 12 L 50 10.5 Z" fill="#3B6EF5"/>
  <!-- tex -->
  <text x="53.5" y="19" font-size="9" font-weight="800" fill="#3B6EF5" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" letter-spacing="-0.2">tex</text>
  <!-- 副券底部小浪 -->
  <path d="M 46 22 Q 49 21, 52 22 T 58 22 T 61 22" stroke="#3B6EF5" stroke-width="0.4" fill="none" opacity="0.6"/>
</svg>
