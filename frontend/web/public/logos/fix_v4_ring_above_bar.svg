<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80" role="img" aria-label="Htex logo ring with open mouth, plane in e">
  <defs>
    <style>
      .htex-d {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "PingFang SC", "Inter", Arial, sans-serif;
        font-weight: 900;
        font-size: 64px;
        letter-spacing: -2px;
      }
    </style>
  </defs>

  <text x="20" y="60" class="htex-d" fill="#000">Htex</text>

  <!-- 圆环 r=7 覆盖 e 中央,但 e 字符横线在圆环下方可见 -->
  <g transform="translate(111, 32)">
    <!-- 圆环(留出 e 横线位置) -->
    <circle cx="0" cy="0" r="7" fill="#fff" stroke="#000" stroke-width="2"/>
    <!-- 飞机 -->
    <path d="M -3.2 -1.5 L 3.2 0 L -3.2 1.5 L -0.8 0 Z" fill="#000"/>
  </g>
</svg>
