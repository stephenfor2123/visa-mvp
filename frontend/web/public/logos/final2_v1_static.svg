<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80" role="img" aria-label="Htex logo with thin path e and plane">
  <defs>
    <style>
      .htex-htx {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "PingFang SC", "Inter", Arial, sans-serif;
        font-weight: 900;
        font-size: 60px;
        letter-spacing: -2px;
      }
    </style>
  </defs>

  <!-- H t x 用 sans-serif 字体(粗体) -->
  <text x="18" y="58" class="htex-htx" fill="#000">Ht</text>
  <text x="148" y="58" class="htex-htx" fill="#000">x</text>

  <!-- e 字符用 path 画(细窄,像字体版 e,标准字形) -->
  <g stroke="#000" stroke-linecap="round" fill="none" mask="url(#e-mask-v1)">
    <ellipse cx="105" cy="38" rx="8" ry="15" stroke-width="3.2"/>
    <line x1="97" y1="38" x2="113" y2="38" stroke-width="3.2"/>
  </g>

  <defs>
    <!-- 抠掉 e 椭圆右下方一段(标准 e 字符开口) -->
    <mask id="e-mask-v1">
      <rect width="200" height="80" fill="white"/>
      <path d="M 102 50 L 113 38" stroke="black" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    </mask>
  </defs>

  <!-- 飞机在 e 字符中央(在横线上方,准备"飞") -->
  <g transform="translate(109, 35)">
    <path d="M -3.5 -1.6 L 3.5 0 L -3.5 1.6 L -0.8 0 Z" fill="#000"/>
    <line x1="-3.5" y1="-1.6" x2="-0.8" y2="0" stroke="#fff" stroke-width="0.5"/>
    <line x1="-3.5" y1="1.6" x2="-0.8" y2="0" stroke="#fff" stroke-width="0.5"/>
  </g>
</svg>
