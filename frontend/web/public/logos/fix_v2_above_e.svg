<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80" role="img" aria-label="Htex logo plane above e">
  <defs>
    <style>
      .htex-b {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "PingFang SC", "Inter", Arial, sans-serif;
        font-weight: 900;
        font-size: 64px;
        letter-spacing: -2px;
      }
    </style>
  </defs>

  <text x="20" y="60" class="htex-b" fill="#000">Htex</text>

  <!-- 飞机 + 圆环作为 e 字符上方重音(e 字符完整) -->
