<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>register preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; }
  .frame { width: 375px; height: 812px; background: #F1F4F8; display: flex; flex-direction: column; padding: 12px; }
  .auth-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 16px; }
  .brand { display: flex; align-items: center; gap: 6px; }
  .brand-mark { width: 28px; height: 28px; border-radius: 7px; background: #3B6EF5; color: #fff; font-weight: 700; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .brand-name { font-size: 16px; font-weight: 600; color: #1A1D29; }
  .lang-picker { padding: 4px 10px; background: #fff; border-radius: 999px; font-size: 13px; color: #5A5F6D; border: 1px solid #E5E7EB; }
  .auth-card { background: #fff; border-radius: 12px; padding: 20px 16px; box-shadow: 0 1px 6px rgba(15,23,42,.06); }
  .auth-title { font-size: 22px; font-weight: 700; color: #1A1D29; margin-bottom: 4px; }
  .auth-sub { font-size: 13px; color: #9CA3AF; margin-bottom: 16px; }
  .input-row { margin-bottom: 10px; }
  .input-label { font-size: 13px; color: #5A5F6D; font-weight: 500; margin-bottom: 4px; }
  .input-wrap { display: flex; align-items: center; background: #F1F4F8; border-radius: 6px; padding: 0 12px; min-height: 44px; }
  .phone-country { padding: 0 6px; font-size: 14px; color: #1A1D29; border-right: 1px solid #E5E7EB; margin-right: 8px; min-height: 44px; display: flex; align-items: center; }
  .input-field { flex: 1; background: transparent; font-size: 14px; color: #1A1D29; padding: 10px 0; min-height: 44px; border: none; outline: none; }
  .suffix-slot { display: flex; align-items: center; }
  .send-code-btn { padding: 6px 12px; background: transparent; color: #3B6EF5; border: 1px solid #3B6EF5; border-radius: 4px; font-size: 12px; }
  .agreement { display: flex; align-items: flex-start; gap: 6px; font-size: 12px; color: #5A5F6D; line-height: 1.5; margin: 4px 0; }
  .checkbox { width: 16px; height: 16px; border: 1px solid #E5E7EB; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; background: #fff; margin-top: 2px; flex-shrink: 0; }
  .checkbox.checked { background: #3B6EF5; border-color: #3B6EF5; }
  .agreement .link { color: #3B6EF5; }
  .btn-primary-lg { margin-top: 8px; background: #3B6EF5; color: #fff; border: none; border-radius: 6px; padding: 12px 0; font-size: 16px; font-weight: 500; width: 100%; cursor: pointer; }
  .auth-foot { margin-top: 16px; padding-top: 12px; border-top: 1px solid #E5E7EB; text-align: center; font-size: 13px; color: #9CA3AF; }
  .auth-foot .link { margin-left: 4px; color: #3B6EF5; }
  .mock-hint { background: #FFFBEB; border: 1px solid #FCD34D; border-radius: 6px; padding: 8px 10px; font-size: 12px; color: #92400E; margin: -4px 0 8px; }
  .mock-hint .mono { font-family: monospace; font-weight: 700; color: #78350F; }
</style>
</head>
<body>
<div class="frame">
  <div class="auth-header">
    <div class="brand"><div class="brand-mark">V</div><div class="brand-name">签证助手</div></div>
    <div class="lang-picker">中 <span style="color:#9CA3AF">⌄</span></div>
  </div>

  <div class="auth-card">
    <div class="auth-title">创建账号</div>
    <div class="auth-sub">手机号 + 验证码 + 密码,30 秒搞定</div>

    <div class="input-row">
      <div class="input-label">手机号</div>
      <div class="input-wrap">
        <div class="phone-country">🇨🇳 +86</div>
        <input class="input-field" type="text" placeholder="请输入手机号" readonly>
      </div>
    </div>

    <div class="input-row">
      <div class="input-label">验证码</div>
      <div class="input-wrap">
        <input class="input-field" type="text" placeholder="6 位短信验证码" readonly>
        <div class="suffix-slot">
          <button class="send-code-btn">发送验证码</button>
        </div>
      </div>
    </div>

    <div class="input-row">
      <div class="input-label">设置密码</div>
      <div class="input-wrap">
        <input class="input-field" type="password" placeholder="8-32 位,字母 + 数字" readonly>
      </div>
    </div>

    <div class="input-row">
      <div class="input-label">确认密码</div>
      <div class="input-wrap">
        <input class="input-field" type="password" placeholder="再次输入密码" readonly>
      </div>
    </div>

    <div class="agreement">
      <div class="checkbox checked">✓</div>
      <div>
        我已阅读并同意
        <span class="link">《用户协议》</span>
        和
        <span class="link">《隐私政策》</span>
      </div>
    </div>

    <button class="btn-primary-lg">注 册</button>

    <div class="auth-foot">
      <span>已有账号?</span>
      <span class="link">立即登录</span>
    </div>
  </div>
</div>
</body>
</html>
