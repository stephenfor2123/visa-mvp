# GitHub Actions CI — visa-mvp monorepo
# W13-cicd-1 (4 jobs): backend pytest / frontend playwright / flutter analyze / miniprogram build
#
# 触发: push main + PR main,workflow_dispatch 手动跑
# runner: ubuntu-latest (前端/小程序) + macos-latest (Flutter analyze 跨 macos 兼容, ubuntu 优先)
# 缓存: pip / npm / pub 按 hash 分键
# 工件: 后端 coverage / 前端 dist / Flutter analyze log / 小程序 build_report.json
#
# 设计依据 (2026-06-13):
#   - 项目结构 monorepo: backend/ + frontend/{web,ios,miniprogram}
#   - 前端测试栈实为 @playwright/test (package.json L27, 不是 vitest) — 修整实战脚本
#     `npm run test:e2e` 修 `playwright test`, e2e/ 修修 5 spec
#   - backend pytest 修修 postgres service container (V2 修修修)
#   - flutter analyze 修修 ubuntu-latest (subosito/flutter-action 修 macos 修)
#   - miniprogram 修修修修修修 build_weapp.cjs
#     修修静态校验 (不修修 wechat-devtools CLI)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 修修修修: 修修修修 (e.g. docs-only)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  FLUTTER_VERSION: '3.44.2'

jobs:
  # ── 1. Backend pytest (FastAPI + SQLAlchemy + alembic) ────────────
  backend-pytest:
    name: Backend pytest (FastAPI + Postgres)
    runs-on: ubuntu-latest
    # Postgres service container: V2 设计用 Postgres (JSONB + BIGINT[]),
    # dev 用 sqlite (tests/conftest.py 修修修),CI 修修修
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: visa_test
          POSTGRES_PASSWORD: visa_test
          POSTGRES_DB: visa_test
        ports:
          - 5432:5432
        # 修修修修修修修 (修修)
        options: >-
          --health-cmd "pg_isready -U visa_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Init .env (CI defaults)
        working-directory: backend
        run: |
          # 修修修修修修 DATABASE_URL (修修 Postgres)
          # 修修修 alembic.ini 修修
          if [ ! -f .env ]; then
            cp .env.example .env
            sed -i '' 's|^DATABASE_URL=.*|DATABASE_URL=postgresql+asyncpg://visa_test:visa_test@localhost:5432/visa_test|' .env 2>/dev/null \
              || sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql+asyncpg://visa_test:visa_test@localhost:5432/visa_test|' .env
            sed -i '' 's|^JWT_SECRET=.*|JWT_SECRET=ci-test-secret-do-not-use-in-prod-1234567890|' .env 2>/dev/null \
              || sed -i 's|^JWT_SECRET=.*|JWT_SECRET=ci-test-secret-do-not-use-in-prod-1234567890|' .env
          fi
          cat .env | grep -E '^(DATABASE_URL|JWT_SECRET|SMS_|STRIPE_|SYSTEM_API_KEY)' || true

      - name: Run alembic migrations
        working-directory: backend
        run: |
          # 修修修修 Postgres,CI 修修修修修修 upgrade head
          # (sqlite dev 修修修,conftest.py 修修修修修修 create_all)
          alembic upgrade head || echo "WARNING: alembic upgrade failed, tests may use create_all fallback"

      - name: Run pytest
        working-directory: backend
        run: |
          # -m "not slow" 修修修修 (OCR PaddleOCR warmup 修修 60s+)
          # --cov 修修修修修修修 (修修修修 ci badge)
          pytest tests/ -m "not slow" --tb=short --maxfail=5 --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ── 2. Frontend playwright (Vue3 + Vite + E2E) ───────────────────
  frontend-playwright:
    name: Frontend E2E (Vue3 + Playwright)
    runs-on: ubuntu-latest
    # D spec 写 frontend-vitest, 修修修修: project 用 @playwright/test
    # (package.json L27, vitest 修修修修). 修修修 修修 修 修
    # 修修 e2e spec (destination / login / register / i18n-full-locale).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install deps
        working-directory: frontend/web
        run: npm ci

      - name: Build (vite build, sanity check)
        working-directory: frontend/web
        run: npm run build

      - name: Install Playwright browsers
        working-directory: frontend/web
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend/web
        run: |
          # CI 修修修修 backend, 修修修修 stub API.
          # frontend/web/tests/e2e/ 修修 5 spec, 修修:
          #   destination.spec.js / login.spec.js / register.spec.js
          #   i18n-full-locale.spec.js / screenshot.spec.js
          npm run test:e2e -- --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: |
            frontend/web/playwright-report/
            frontend/web/test-results/
          retention-days: 7

      - name: Upload frontend dist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/web/dist/
          retention-days: 7

  # ── 3. Flutter analyze (frontend/ios — Dart static analysis) ───────
  flutter-analyze:
    name: Flutter analyze + test (frontend/ios)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('frontend/ios/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: flutter pub get
        working-directory: frontend/ios
        run: flutter pub get

      - name: flutter analyze
        working-directory: frontend/ios
        # --no-pub 修修 pub 修修 (pub get 修修修修修)
        # --no-fatal-infos 修修修修修修修 (info-level 修修修修)
        run: flutter analyze --no-pub --no-fatal-infos --no-fatal-warnings 2>&1 | tee flutter-analyze.log
        continue-on-error: false

      - name: flutter test
        working-directory: frontend/ios
        # widget_test.dart (frontend/ios/test/) 修修修修修
        run: flutter test --no-pub --coverage 2>&1 | tee flutter-test.log
        continue-on-error: true  # 修修修修修修修

      - name: Upload Flutter analyze log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-log
          path: frontend/ios/flutter-analyze.log
          retention-days: 7

      - name: Upload Flutter test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-log
          path: frontend/ios/flutter-test.log
          retention-days: 7

  # ── 4. Miniprogram build (wechat-devtools CLI fallback) ───────────
  miniprogram-build:
    name: Miniprogram build (build_weapp.cjs)
    runs-on: ubuntu-latest
    # D spec 写 wechat-devtools CLI (修装), 修修修修修: project 用
    # frontend/miniprogram/build_weapp.cjs 修修修 (静态校验 + miniprogram-ci
    # 修修) 修修微信开发工具 CLI 修修修修修.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/miniprogram/package-lock.json

      - name: Install deps
        working-directory: frontend/miniprogram
        run: npm ci

      - name: Build weapp (static check + miniprogram-ci attempt)
        working-directory: frontend/miniprogram
        run: |
          # build_weapp.cjs 退出码 0 = BUILD_SUCCESS, 1 = FAIL
          # --verbose 输出完整 JSON report (含每个 check 的 PASS/FAIL)
          npm run build:weapp:verbose
          echo "build_weapp exit=$?"

      - name: Upload build_report.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: miniprogram-build-report
          path: frontend/miniprogram/build_report.json
          retention-days: 7