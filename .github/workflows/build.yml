name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Flutter Web ───────────────────────────────────────────────
  web:
    name: Flutter Web Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-web-v3-44-2

      - name: Web deps
        run: cd frontend/web && npm ci

      - name: Flutter web build
        run: cd frontend/ios && flutter build web --release
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: frontend/ios/build/web/
          retention-days: 7

  # ── Flutter iOS (simulator) ──────────────────────────────────
  ios:
    name: Flutter iOS Simulator Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-ios-v3-44-2

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: frontend/ios/ios/Pods
          key: pods-macos-14-v1

      - name: iOS deps
        run: |
          cd frontend/ios
          flutter pub get
          cd ios && pod install --repo-update

      - name: Flutter iOS build
        run: |
          cd frontend/ios
          flutter build ios --simulator --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-build
          path: frontend/ios/build/ios/
          retention-days: 7

  # ── WeChat Miniprogram ───────────────────────────────────────
  miniprogram:
    name: Miniprogram Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/miniprogram/package-lock.json

      - name: Install deps
        run: cd frontend/miniprogram && npm ci

      - name: Miniprogram build
        run: |
          cd frontend/miniprogram
          npm run build:weapp
          npm run build:weapp:verbose

      - name: Upload build report
        uses: actions/upload-artifact@v4
        with:
          name: miniprogram-report
          path: frontend/miniprogram/build_report.json
          retention-days: 7