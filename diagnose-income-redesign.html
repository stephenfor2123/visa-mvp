<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Htex · 签证准备度评估</title>
  <style>
    :root {
      --primary: #2563EB;
      --primary-hover: #1D4ED8;
      --primary-active: #1E40AF;
      --primary-bg: #EFF6FF;
      --bg: #FFFFFF;
      --bg-alt: #F8FAFC;
      --bg-disabled: #F1F5F9;
      --ink-1: #0F172A;
      --ink-2: #475569;
      --ink-3: #64748B;
      --muted: #94A3B8;
      --border: #E2E8F0;
      --font: -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink-1);
      background: var(--bg-alt);
      font-family: var(--font);
      font-size: 16px;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .site-header {
      position: sticky;
      z-index: 20;
      top: 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .header-inner {
      width: min(1200px, calc(100% - 80px));
      height: 62px;
      display: flex;
      align-items: center;
      gap: 24px;
      margin: 0 auto;
      padding: 14px 20px;
    }

    .brand {
      flex: 0 0 auto;
      color: var(--ink-1);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -1px;
      text-decoration: none;
    }

    .main-nav {
      display: flex;
      align-items: center;
      gap: 22px;
      margin-left: 32px;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--ink-1);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-link:hover,
    .nav-link[aria-current="page"] {
      color: var(--primary);
    }

    .chevron {
      width: 6px;
      height: 6px;
      border-right: 1px solid currentColor;
      border-bottom: 1px solid currentColor;
      transform: rotate(45deg) translateY(-2px);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .icon-button,
    .account-button {
      width: 34px;
      height: 34px;
      display: grid;
      flex: 0 0 auto;
      place-items: center;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--ink-2);
      background: var(--bg);
    }

    .icon-button:hover,
    .account-button:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: var(--primary-bg);
    }

    .icon-button svg,
    .account-button svg,
    .privacy-button svg {
      width: 17px;
      height: 17px;
    }

    .privacy-button,
    .language-button {
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .privacy-button {
      color: var(--primary);
      border: 1px solid var(--primary);
      background: var(--primary-bg);
    }

    .language-button {
      color: var(--ink-2);
      border: 1px solid var(--border);
      background: var(--bg);
    }

    .language-button:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: var(--primary-bg);
    }

    .page {
      width: min(1200px, calc(100% - 80px));
      margin: 0 auto;
      padding: 32px 0 64px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 0 20px;
      color: var(--ink-3);
      font-size: 14px;
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--primary);
    }

    .page-title {
      margin: 0;
      color: var(--ink-1);
      font-size: 22px;
      font-weight: 700;
      line-height: normal;
    }

    .page-title span {
      color: var(--primary);
    }

    .assessment-form {
      width: 100%;
    }

    .assessment-card {
      overflow: hidden;
      border: 1px solid var(--bg-disabled);
      border-radius: 16px;
      background: var(--bg);
    }

    .assessment-header {
      padding: 40px 40px 32px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      row-gap: 32px;
      padding: 0 40px 40px;
    }

    .field {
      min-width: 0;
      margin: 0;
      padding: 0;
      border: 0;
    }

    .field-title {
      margin: 0 0 12px;
      color: var(--ink-1);
      font-size: 16px;
      font-weight: 700;
      line-height: 20.8px;
    }

    .field-help {
      min-height: 0;
      margin: -6px 0 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .field-help:empty {
      display: none;
    }

    .choices {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .choice {
      position: relative;
    }

    .choice input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .choice span {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--ink-2);
      background: var(--bg-alt);
      font-size: 14px;
      font-weight: 500;
      line-height: normal;
    }

    .choice span:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: var(--primary-bg);
    }

    .choice input:focus-visible + span {
      border-color: var(--primary);
    }

    .choice input:checked + span {
      color: var(--primary);
      border-color: var(--primary);
      background: var(--primary-bg);
    }

    .choice input:checked + span:hover {
      border-color: var(--primary-hover);
      color: var(--primary-hover);
      background: var(--primary-bg);
    }

    .form-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin: 0 40px;
      padding: 32px 0 40px;
      border-top: 1px solid var(--bg-disabled);
    }

    .save-state {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--ink-3);
      font-size: 13px;
    }

    .save-state::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
    }

    .action-buttons {
      display: flex;
      gap: 10px;
    }

    .button {
      min-height: 40px;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      line-height: 13px;
    }

    .button-secondary {
      color: var(--ink-2);
      border: 1px solid var(--border);
      background: var(--bg);
    }

    .button-secondary:hover {
      color: var(--primary-hover);
      border-color: var(--primary-hover);
      background: var(--primary-bg);
    }

    .button-primary {
      color: var(--bg);
      border: 1px solid var(--primary);
      background: var(--primary);
    }

    .button-primary:hover {
      border-color: var(--primary-hover);
      background: var(--primary-hover);
    }

    .button-primary:active {
      border-color: var(--primary-active);
      background: var(--primary-active);
    }

    @media (max-width: 820px) {
      .header-inner {
        width: calc(100% - 40px);
      }

      .main-nav {
        display: none;
      }

      .page {
        width: calc(100% - 40px);
      }
    }

    @media (max-width: 560px) {
      .header-inner {
        width: 100%;
        height: 62px;
        padding: 14px 20px;
      }

      .privacy-button span,
      .language-button span,
      .language-button .chevron {
        display: none;
      }

      .privacy-button,
      .language-button {
        width: 34px;
        padding: 0;
        border-radius: 50%;
      }

      .language-button {
        font-size: 0;
      }

      .page {
        width: 100%;
        padding: 32px 20px 64px;
      }

      .page-title {
        margin-bottom: 0;
      }

      .assessment-header {
        padding: 32px 20px;
      }

      .form-grid {
        padding: 0 20px 32px;
      }

      .page-title {
        font-size: 22px;
        line-height: normal;
      }

      .form-actions {
        margin: 0 20px;
        padding: 32px 0;
      }

      .form-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .action-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .button {
        width: 100%;
      }

    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="#">Htex</a>

      <nav class="main-nav" aria-label="主导航">
        <a class="nav-link" href="#">办签证 <span class="chevron"></span></a>
        <a class="nav-link" href="#" aria-current="page">查通过率 <span class="chevron"></span></a>
        <a class="nav-link" href="#">看政策 <span class="chevron"></span></a>
        <a class="nav-link" href="#">联系我们 <span class="chevron"></span></a>
        <a class="nav-link" href="#">产品定价 <span class="chevron"></span></a>
      </nav>

      <div class="header-actions">
        <button class="icon-button" type="button" aria-label="搜索">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="11" cy="11" r="6.5"/><path d="m16 16 4 4"/>
          </svg>
        </button>

        <button class="privacy-button" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="5" y="10" width="14" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>
          </svg>
          <span>隐私保护</span>
          <span class="chevron"></span>
        </button>

        <button class="language-button" type="button" aria-label="切换语言">
          🇨🇳
          <span>中文</span>
          <span class="chevron"></span>
        </button>

        <button class="account-button" type="button" aria-label="账户">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="8" r="3.5"/><path d="M5 21c.5-4.2 2.8-6.5 7-6.5s6.5 2.3 7 6.5"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="page">
    <a class="back-link" href="#">
      <span aria-hidden="true">←</span>
      返回选国家
    </a>

    <section class="assessment-card">
      <header class="assessment-header">
        <h1 class="page-title">第 2 步：个人情况 · <span>美国</span></h1>
      </header>

      <form class="assessment-form" id="assessment-form">
        <div class="form-grid">
        <fieldset class="field">
          <legend class="field-title">婚姻状况</legend>
          <p class="field-help"></p>
          <div class="choices">
            <label class="choice"><input type="radio" name="marriage" value="未婚" checked><span>未婚</span></label>
            <label class="choice"><input type="radio" name="marriage" value="已婚"><span>已婚</span></label>
            <label class="choice"><input type="radio" name="marriage" value="离异"><span>离异</span></label>
            <label class="choice"><input type="radio" name="marriage" value="丧偶"><span>丧偶</span></label>
          </div>
        </fieldset>

        <fieldset class="field">
          <legend class="field-title">月收入（人民币）</legend>
          <p class="field-help"></p>
          <div class="choices">
            <label class="choice"><input type="radio" name="income" value="5k 以下"><span>5k 以下</span></label>
            <label class="choice"><input type="radio" name="income" value="5k - 15k"><span>5k - 15k</span></label>
            <label class="choice"><input type="radio" name="income" value="15k - 30k" checked><span>15k - 30k</span></label>
            <label class="choice"><input type="radio" name="income" value="30k - 100k"><span>30k - 100k</span></label>
            <label class="choice"><input type="radio" name="income" value="100k 以上"><span>100k 以上</span></label>
          </div>
        </fieldset>

        <fieldset class="field">
          <legend class="field-title">出行目的</legend>
          <p class="field-help"></p>
          <div class="choices">
            <label class="choice"><input type="radio" name="purpose" value="商务"><span>商务</span></label>
            <label class="choice"><input type="radio" name="purpose" value="旅游" checked><span>旅游</span></label>
            <label class="choice"><input type="radio" name="purpose" value="探亲"><span>探亲</span></label>
            <label class="choice"><input type="radio" name="purpose" value="留学"><span>留学</span></label>
            <label class="choice"><input type="radio" name="purpose" value="其他"><span>其他</span></label>
          </div>
        </fieldset>

        <fieldset class="field">
          <legend class="field-title">近 5 年国际旅行次数</legend>
          <p class="field-help">指跨国/出境旅行，免签和落地签都算；国内出行不计入</p>
          <div class="choices">
            <label class="choice"><input type="radio" name="travel" value="无"><span>无</span></label>
            <label class="choice"><input type="radio" name="travel" value="1-3 次" checked><span>1-3 次</span></label>
            <label class="choice"><input type="radio" name="travel" value="4-10 次"><span>4-10 次</span></label>
            <label class="choice"><input type="radio" name="travel" value="10+ 次"><span>10+ 次</span></label>
          </div>
        </fieldset>

        <fieldset class="field">
          <legend class="field-title">已办签证次数（累计，含已过期）</legend>
          <p class="field-help">按签证申请次数计，同一国家多次申请累加；拒签不计入</p>
          <div class="choices">
            <label class="choice"><input type="radio" name="visa" value="从未办过签证" checked><span>从未办过签证</span></label>
            <label class="choice"><input type="radio" name="visa" value="1-2 次"><span>1-2 次</span></label>
            <label class="choice"><input type="radio" name="visa" value="3+ 次"><span>3+ 次</span></label>
          </div>
        </fieldset>

        <fieldset class="field">
          <legend class="field-title">目前身份 / 工作状态</legend>
          <p class="field-help">兼职工/合同工算在职；自由职业/个体户另选；应届待业、家庭主妇选待业</p>
          <div class="choices">
            <label class="choice"><input type="radio" name="work" value="在职（雇员/合同工）" checked><span>在职（雇员/合同工）</span></label>
            <label class="choice"><input type="radio" name="work" value="自由职业/个体经营"><span>自由职业/个体经营</span></label>
            <label class="choice"><input type="radio" name="work" value="学生/在读"><span>学生/在读</span></label>
            <label class="choice"><input type="radio" name="work" value="退休"><span>退休</span></label>
            <label class="choice"><input type="radio" name="work" value="待业/无固定工作"><span>待业/无固定工作</span></label>
          </div>
        </fieldset>

        </div>

        <div class="form-actions">
          <span class="save-state">已自动保存</span>
          <div class="action-buttons">
            <button class="button button-secondary" type="button">上一步</button>
            <button class="button button-primary" type="submit">下一步</button>
          </div>
        </div>
      </form>
    </section>
  </main>

  <script>
    document.querySelector("#assessment-form").addEventListener("submit", function (event) {
      event.preventDefault();
    });

  </script>
</body>
</html>
