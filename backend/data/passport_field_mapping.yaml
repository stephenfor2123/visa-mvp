# OCR Passport Field Mapping — 9 Countries
# W14-1 — Visa MVP Project
# Countries: Indonesia / Vietnam / Philippines / Thailand / Malaysia / Singapore / China / Japan / Korea
#
# Fields per country:
#   country_code       : ISO 3166-1 alpha-2 code
#   country_name_en    : English name
#   country_name_zh    : Chinese name
#   passport_number_re : full-match regex for passport number validation
#   expiry_min_months  : minimum validity required (months from today)
#   date_fmt           : strftime format for date parsing
#   surname_pos        : key name for surname in OCR parsed dict
#   given_name_pos     : key name for given name(s) in OCR parsed dict
#   birth_date_field    : key name for date of birth
#   expiry_date_field  : key name for expiry date
#   gender_map         : map of OCR gender values → normalized values (M/F)
#   field_order        : recommended parsing order

# Indonesia (ID) — Machine Readable Zone: 9 chars, format LLLNNNNNNL
id:
  country_code: ID
  country_name_en: Indonesia
  country_name_zh: 印度尼西亚
  passport_number_re: "^[A-Z][0-9]{8}$"
  expiry_min_months: 6
  date_fmt: "%d/%m/%Y"
  surname_pos: "surname"
  given_name_pos: "given_name"
  birth_date_field: "date_of_birth"
  expiry_date_field: "expiry_date"
  gender_map:
    L: "F"
    P: "F"
    M: "M"
    male: "M"
    female: "F"
    Laki-laki: "M"
    Perempuan: "F"
  field_order:
    - passport_no
    - surname
    - given_name
    - sex
    - nationality
    - date_of_birth
    - expiry_date
  visa_types:
    B211A:
      surname: fullname
      given_names: fullname
      passport_number: passportno
      nationality: nationality
      birth_date: birthday
      expiry_date: passport_expiry
      gender: sex
    Visa_on_Arrival:
      surname: fullname
      given_names: fullname
      passport_number: passportno
      nationality: nationality
      birth_date: birthday
      expiry_date: passport_expiry
      gender: sex

