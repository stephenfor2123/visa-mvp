[pytest]
asyncio_mode = auto
# W21.5 fix: function-scope loop 恢复,避免 session-scope engine 被破坏的 test
# 污染后续 test 导致 ECONNREFUSED. 旧 asyncpg engine 跨 loop 报错通过 fixture scope 修复.
asyncio_default_fixture_loop_scope = function
asyncio_default_test_loop_scope = function
testpaths = tests
addopts = -v --tb=short --strict-markers
markers =
    slow: slow tests (skip with -m 'not slow')
    real_consent: run against the real GDPR consent gate (disables the autouse bypass)
filterwarnings =
    ignore::DeprecationWarning
