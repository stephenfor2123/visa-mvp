# OCR Passport Field Mapping — 9 Countries
# V2 §5.1.3 — ICAO Doc 9303 + country-specific extensions
#
# Fields per country:
#   passport_re   : full-match regex for passport number
#   date_fmt     : strftime format for date-of-birth / expiry
#   surname_pos  : key name for surname in OCR parsed dict
#   given_name_pos: key name for given name(s) in OCR parsed dict
#   gender_map : map of OCR gender values → normalized values
#
# Reference formats (ICAO 9303 TD1/TD2/TD3):
#   TD1  : 9 chars (A[0-9]{8})
#   TD2 : 2 letters + 7 digits
#   TD3  : 3 letters + 2 digits + 7 digits (not used below)

us:
  country_code: US
  country_name_zh: 美国
  country_name_en: United States
  passport_re: "^[A-Z][0-9]{8}$"
  date_fmt: "%m/%d/%Y"
  surname_pos: "surname"
  given_name_pos: "given_name"
  gender_map:
    M: "M"
    male: "M"
    F: "F"
    female: "F"
  field_order:
    - passport_no
    - surname
    - given_name
    - sex
    - nationality
    - date_of_birth
    - expiry_date

